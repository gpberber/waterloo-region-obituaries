name: Daily Obituary Update

on:
  schedule:
    - cron: '0 13 * * *'   # 9am EDT / 8am EST (UTC-4/UTC-5)
  workflow_dispatch:         # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-v1-${{ runner.os }}-${{ hashFiles('.github/workflows/update.yml') }}
          restore-keys: r-pkgs-v1-${{ runner.os }}-

      - name: Install R packages
        run: |
          Rscript -e "install.packages(
            c('rvest', 'httr', 'dplyr', 'readr', 'stringr', 'lubridate'),
            repos = 'https://cloud.r-project.org',
            quiet = TRUE
          )"

      - name: Run scraper
        run: Rscript scrape.R

      - name: Commit and push updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/obituaries.csv index.html
          git diff --staged --quiet || git commit -m "Update obituaries $(date -u +'%Y-%m-%d')"
          git push
